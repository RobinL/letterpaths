[project]
name = "letterpaths-font"
version = "0.1.0"
description = "Build installable fonts from letterpaths cursive geometry."
requires-python = ">=3.10"
dependencies = [
    "brotli>=1.1",
    "fonttools>=4.50",
    "skia-pathops>=0.8",
    "skia-python>=87.5",
    "ufo2ft>=3.0",
    "ufoLib2>=0.16",
    "uharfbuzz>=0.39",
]

[tool.uv]
package = false
