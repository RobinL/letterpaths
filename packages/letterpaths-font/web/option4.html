<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Letterpaths Option4</title>
    <style>
        @font-face {
            font-family: "Letterpaths Option4";
            src: url("../fonts/LetterpathsOption4.woff2") format("woff2"),
                url("../fonts/LetterpathsOption4.otf") format("opentype");
            font-display: block;
        }

        body {
            margin: 2rem;
            color: #1b1b1b;
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                Arial, sans-serif;
        }

        h1 {
            font-size: 1.2rem;
        }

        .sample {
            font-family: "Letterpaths Option4";
            font-feature-settings: "calt" 1, "kern" 1;
            font-size: 64px;
            line-height: 1.5;
            max-width: 1100px;
        }
    </style>
</head>

<body>
    <h1>Letterpaths Option4</h1>
    <p class="sample">bro ro ovo wow avenue handwriting quartz aqua off banana</p>
</body>

</html>
